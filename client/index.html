<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SciencePlatform — Академічний портал та науковий блог</title>
    <meta
      name="title"
      content="SciencePlatform — Академічний портал та науковий блог"
    />
    <meta
      name="description"
      content="Платформа для науковців: грантові програми, академічні новини, методологія досліджень та професійний блог."
    />
    <meta
      name="keywords"
      content="наука, блог, академічна платформа, дослідження, гранти, конференції, SciencePlatform, Open Science"
    />
    <meta name="author" content="SciencePlatform Team" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scienceplatform.com/" />
    <meta
      property="og:title"
      content="SciencePlatform — Твій шлях у світ науки"
    />
    <meta
      property="og:description"
      content="Діліться знаннями, знаходьте конференції та читайте найкращі наукові поради."
    />
    <meta property="og:image" content="/og-image.jpg" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://scienceplatform.com/" />
    <meta
      property="twitter:title"
      content="SciencePlatform — Академічний портал"
    />
    <meta
      property="twitter:description"
      content="Професійний інструментарій для сучасного науковця."
    />
    <meta property="twitter:image" content="/og-image.jpg" />

    <meta name="theme-color" content="#6d28d9" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <style>
      :root {
        --bg-initial: #ffffff;
      }
      html.dark {
        --bg-initial: #0d0d0e;
      }
      body {
        background-color: var(--bg-initial);
        margin: 0;
      }

      #initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <noscript>
      <div style="text-align: center; padding: 20px">
        Для роботи SciencePlatform потрібно увімкнути JavaScript у вашому
        браузері.
      </div>
    </noscript>

    <div id="root">
      <div id="initial-loader">
        <div
          style="
            width: 40px;
            height: 40px;
            border: 3px solid #6d28d9;
            border-top-color: transparent;
            border-radius: 50%;
            animate: spin 1s linear infinite;
          "
        ></div>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        const theme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </body>
</html>
